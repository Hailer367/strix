name: Strix Autonomous Dashboard

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Maximum scan duration (hours)'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
          - '7'
          - '8'
      enable_root_access:
        description: 'Enable root access for agent'
        required: false
        default: true
        type: boolean
      debug_mode:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean

env:
  STRIX_DASHBOARD_PORT: 8080
  STRIX_USE_ROOCODE: "true"

jobs:
  dashboard:
    name: Start Dashboard & Run Scan
    runs-on: ubuntu-latest
    timeout-minutes: 480  # 8 hours max
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Verify Docker Installation
        run: |
          # Docker is pre-installed on GitHub runners, just verify it's working
          docker --version
          docker info || sudo systemctl start docker
          # Add current user to docker group (may require newgrp for current session)
          sudo usermod -aG docker $USER
      
      - name: Install Strix
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install
      
      - name: Configure Environment
        env:
          ROOCODE_TOKEN: ${{ secrets.ROOCODE_ACCESS_TOKEN }}
          PERPLEXITY_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "STRIX_ROOT_ACCESS=${{ inputs.enable_root_access }}" >> $GITHUB_ENV
          echo "STRIX_ACCESS_LEVEL=${{ inputs.enable_root_access && 'root' || 'standard' }}" >> $GITHUB_ENV
          echo "STRIX_DEBUG=${{ inputs.debug_mode }}" >> $GITHUB_ENV
          echo "STRIX_DURATION_HOURS=${{ inputs.duration_hours }}" >> $GITHUB_ENV
          
          # Set up Roo Code token if available (check actual env var, not the secret directly)
          if [ -n "$ROOCODE_TOKEN" ] && [ "$ROOCODE_TOKEN" != "" ]; then
            echo "ROOCODE_ACCESS_TOKEN=$ROOCODE_TOKEN" >> $GITHUB_ENV
            echo "Roo Code token configured"
          fi
          
          # Set up Perplexity API key if available
          if [ -n "$PERPLEXITY_KEY" ] && [ "$PERPLEXITY_KEY" != "" ]; then
            echo "PERPLEXITY_API_KEY=$PERPLEXITY_KEY" >> $GITHUB_ENV
            echo "Perplexity API key configured"
          fi
      
      - name: Calculate Timeout Minutes
        id: timeout
        run: |
          DURATION_HOURS="${{ inputs.duration_hours }}"
          TIMEOUT_MINUTES=$((DURATION_HOURS * 60))
          echo "timeout_minutes=$TIMEOUT_MINUTES" >> $GITHUB_OUTPUT
          echo "Scan timeout set to $TIMEOUT_MINUTES minutes ($DURATION_HOURS hours)"
      
      - name: Start Dashboard Server
        id: dashboard
        run: |
          # Create a PID file location
          PIDFILE="/tmp/strix_dashboard.pid"
          
          # Start the dashboard server in background
          nohup poetry run python -m strix.dashboard.server --port $STRIX_DASHBOARD_PORT > /tmp/dashboard.log 2>&1 &
          DASHBOARD_PID=$!
          echo $DASHBOARD_PID > "$PIDFILE"
          echo "dashboard_pid=$DASHBOARD_PID" >> $GITHUB_OUTPUT
          echo "Dashboard started with PID: $DASHBOARD_PID"
          
          # Wait for server to be ready
          echo "Waiting for dashboard server to start..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:$STRIX_DASHBOARD_PORT/api/status > /dev/null 2>&1; then
              echo "Dashboard server is ready!"
              SERVER_READY=true
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          
          if [ "$SERVER_READY" = false ]; then
            echo "Warning: Dashboard server may not be fully ready. Checking logs:"
            cat /tmp/dashboard.log || true
          fi
      
      - name: Setup Cloudflare Tunnel
        id: tunnel
        run: |
          # Create a PID file location
          TUNNEL_PIDFILE="/tmp/cloudflared.pid"
          
          # Install cloudflared
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          
          # Start tunnel and capture URL
          nohup ./cloudflared tunnel --url http://localhost:$STRIX_DASHBOARD_PORT --no-autoupdate > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo $TUNNEL_PID > "$TUNNEL_PIDFILE"
          echo "tunnel_pid=$TUNNEL_PID" >> $GITHUB_OUTPUT
          echo "Cloudflare tunnel started with PID: $TUNNEL_PID"
          
          # Wait for tunnel URL with retry logic
          echo "Starting Cloudflare tunnel..."
          TUNNEL_URL=""
          for i in {1..12}; do
            sleep 5
            # Try multiple grep patterns for URL extraction
            TUNNEL_URL=$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log 2>/dev/null | head -1) || true
            if [ -n "$TUNNEL_URL" ]; then
              echo "Tunnel URL found: $TUNNEL_URL"
              break
            fi
            echo "Attempt $i/12 - waiting for tunnel URL..."
          done
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "Failed to get tunnel URL after 60 seconds. Checking logs..."
            cat /tmp/tunnel.log
            exit 1
          fi
          
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "::notice title=Dashboard URL::$TUNNEL_URL"
      
      - name: Display Dashboard URL
        run: |
          echo "=============================================="
          echo "  🦉 STRIX AUTONOMOUS DASHBOARD"
          echo "=============================================="
          echo ""
          echo "  📍 Dashboard URL:"
          echo "  ${{ steps.tunnel.outputs.tunnel_url }}"
          echo ""
          echo "=============================================="
          echo ""
          echo "  Instructions:"
          echo "  1. Open the URL above in your browser"
          echo "  2. Login with your Roo Code account"
          echo "  3. Configure your target and settings"
          echo "  4. Click 'Configure and Fire' to start"
          echo ""
          echo "  The scan will run for up to ${{ inputs.duration_hours }} hours"
          echo "=============================================="
      
      - name: Wait for Configuration
        run: |
          echo "Waiting for user to configure and start scan..."
          CONFIG_READY_FILE="/tmp/strix_config_ready"
          MAX_WAIT=$((60 * 30))  # 30 minutes max wait for configuration
          WAITED=0
          
          while [ ! -f "$CONFIG_READY_FILE" ] && [ $WAITED -lt $MAX_WAIT ]; do
            sleep 10
            WAITED=$((WAITED + 10))
            echo "Waiting for configuration... ($WAITED seconds)"
          done
          
          if [ ! -f "$CONFIG_READY_FILE" ]; then
            echo "Configuration timeout. Please restart the workflow."
            exit 1
          fi
          
          echo "Configuration received! Starting autonomous scan..."
      
      - name: Run Autonomous Scan
        env:
          SCAN_TIMEOUT_MINUTES: ${{ steps.timeout.outputs.timeout_minutes }}
        run: |
          # Load configuration
          CONFIG_FILE="/tmp/strix_scan_config.json"
          
          if [ -f "$CONFIG_FILE" ]; then
            # Extract target from config
            TARGET=$(jq -r '.targets.primary' "$CONFIG_FILE")
            
            if [ -n "$TARGET" ] && [ "$TARGET" != "null" ]; then
              echo "Starting scan for target: $TARGET"
              
              # Load environment from config
              if [ -f "/tmp/strix_scan_config.env" ]; then
                source /tmp/strix_scan_config.env
              fi
              
              # Calculate duration in minutes
              DURATION_MINUTES=$((${STRIX_DURATION_HOURS:-2} * 60))
              
              # Build the command with optional root access flag
              STRIX_CMD="poetry run strix -n --target \"$TARGET\" --run-name \"github-action-$(date +%Y%m%d-%H%M%S)\""
              if [ "${{ inputs.enable_root_access }}" = "true" ]; then
                STRIX_CMD="$STRIX_CMD --root-access"
              fi
              
              # Run the scan with timeout
              timeout "${SCAN_TIMEOUT_MINUTES}m" bash -c "$STRIX_CMD" || {
                EXIT_CODE=$?
                if [ $EXIT_CODE -eq 124 ]; then
                  echo "Scan completed (reached time limit)"
                  exit 0
                else
                  echo "Scan exited with code: $EXIT_CODE"
                  exit $EXIT_CODE
                fi
              }
            else
              echo "No valid target found in configuration"
              exit 1
            fi
          else
            echo "Configuration file not found"
            exit 1
          fi
        timeout-minutes: 480
      
      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strix-scan-results
          path: strix_runs/
          retention-days: 30
          if-no-files-found: warn
      
      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up background processes..."
          
          # Kill dashboard server using PID file
          if [ -f "/tmp/strix_dashboard.pid" ]; then
            DASHBOARD_PID=$(cat /tmp/strix_dashboard.pid)
            if kill -0 "$DASHBOARD_PID" 2>/dev/null; then
              echo "Stopping dashboard server (PID: $DASHBOARD_PID)"
              kill "$DASHBOARD_PID" || true
            fi
            rm -f /tmp/strix_dashboard.pid
          fi
          
          # Kill cloudflared tunnel using PID file
          if [ -f "/tmp/cloudflared.pid" ]; then
            TUNNEL_PID=$(cat /tmp/cloudflared.pid)
            if kill -0 "$TUNNEL_PID" 2>/dev/null; then
              echo "Stopping cloudflare tunnel (PID: $TUNNEL_PID)"
              kill "$TUNNEL_PID" || true
            fi
            rm -f /tmp/cloudflared.pid
          fi
          
          # Fallback: kill any remaining processes by name
          pkill -f "strix.dashboard.server" || true
          pkill -f "cloudflared" || true
          
          echo "Cleanup completed"
