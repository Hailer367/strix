name: Strix Autonomous Dashboard (Qwen Code)

# Qwen Code CLI Authentication Options (Reference: https://github.com/QwenLM/qwen-code):
# 
# 1. Qwen OAuth (RECOMMENDED - Start in 30 seconds):
#    - 2,000 free requests per day
#    - 60 requests per minute rate limit
#    - NO token limits, NO regional limits
#    - Automatic browser-based authentication in workflow
#    - Credentials passed to dashboard automatically
#
# 2. OpenRouter (via qwen-code CLI):
#    - Requires OPENROUTER_API_KEY secret
#    - 1,000 free requests/day on free tier
#    - API key and endpoint auto-configured

on:
  workflow_dispatch:
    inputs:
      # Time Configuration
      duration_hours:
        description: 'Scan duration (hours)'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '6'
          - '8'
          - '12'
      duration_minutes:
        description: 'Additional minutes (added to hours)'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '15'
          - '30'
          - '45'
      
      # Access Control
      enable_root_access:
        description: 'Enable root access for agent'
        required: false
        default: true
        type: boolean
      access_level:
        description: 'Access level (if not root)'
        required: false
        default: 'root'
        type: choice
        options:
          - 'root'
          - 'elevated'
          - 'standard'
      
      # Agent Behavior
      planning_depth:
        description: 'Planning depth for analysis'
        required: false
        default: 'thorough'
        type: choice
        options:
          - 'quick'
          - 'balanced'
          - 'thorough'
      max_iterations:
        description: 'Maximum agent iterations'
        required: false
        default: '300'
        type: choice
        options:
          - '100'
          - '200'
          - '300'
          - '500'
          - '1000'
      enable_multi_agent:
        description: 'Enable multi-agent collaboration'
        required: false
        default: true
        type: boolean
      
      # Qwen Code API Provider - THIS IS THE KEY SELECTION
      api_provider:
        description: 'Qwen Code API provider (determines authentication flow)'
        required: true
        default: 'qwen_oauth'
        type: choice
        options:
          - 'qwen_oauth'    # RECOMMENDED: 2,000 requests/day, auth via workflow
          - 'openrouter'    # 1,000 free requests/day, requires API key secret
      
      # Model Selection (only applies to OpenRouter - Qwen OAuth has single model)
      qwen_model:
        description: 'Model (OpenRouter only - Qwen OAuth uses default model)'
        required: false
        default: 'qwen/qwen3-coder:free'
        type: choice
        options:
          - 'qwen/qwen3-coder:free'    # OpenRouter free tier
          - 'qwen/qwen3-coder'         # OpenRouter paid
      
      # Output Configuration
      output_format:
        description: 'Report output format'
        required: false
        default: 'markdown'
        type: choice
        options:
          - 'markdown'
          - 'json'
          - 'html'
      severity_threshold:
        description: 'Minimum severity to report'
        required: false
        default: 'info'
        type: choice
        options:
          - 'critical'
          - 'high'
          - 'medium'
          - 'low'
          - 'info'
      
      # Debugging
      debug_mode:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean
      
      # Configuration Wait Time
      config_wait_minutes:
        description: 'Minutes to wait for dashboard configuration'
        required: false
        default: '30'
        type: choice
        options:
          - '15'
          - '30'
          - '45'
          - '60'

env:
  STRIX_DASHBOARD_PORT: 8080
  STRIX_USE_QWENCODE: "true"

jobs:
  # =============================================================================
  # JOB 1: Qwen OAuth Authentication Flow
  # This job runs ONLY when qwen_oauth is selected
  # It initiates the qwen CLI auth and provides login URL to user
  # =============================================================================
  qwen_oauth_auth:
    name: Qwen OAuth Authentication
    runs-on: ubuntu-latest
    if: ${{ inputs.api_provider == 'qwen_oauth' }}
    timeout-minutes: 15
    outputs:
      auth_token: ${{ steps.auth.outputs.auth_token }}
      auth_success: ${{ steps.auth.outputs.auth_success }}
      auth_url: ${{ steps.auth.outputs.auth_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install qwen-code CLI
        run: |
          npm install -g @qwen-code/qwen-code@latest
          echo "::notice::Installed qwen-code CLI for Qwen OAuth authentication"
      
      - name: Initiate Qwen OAuth Authentication
        id: auth
        run: |
          echo "=============================================="
          echo "  🔐 QWEN OAUTH AUTHENTICATION"
          echo "  Using Device Authorization Flow with PKCE"
          echo "=============================================="
          echo ""
          echo "  Starting Qwen Code CLI device authorization..."
          echo "  This will provide you with a proper login URL."
          echo ""
          
          # Create a script to perform proper OAuth Device Authorization Flow
          # Based on official qwen-code implementation: https://github.com/QwenLM/qwen-code
          cat > /tmp/qwen_device_auth.js << 'DEVICEAUTHSCRIPT'
          const https = require('https');
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');
          
          // =============================================================================
          // OFFICIAL Qwen OAuth Device Authorization Configuration
          // Based on: https://github.com/QwenLM/qwen-code/blob/main/packages/core/src/qwen/qwenOAuth2.ts
          // =============================================================================
          
          const QWEN_OAUTH_BASE_URL = 'https://chat.qwen.ai';
          const QWEN_OAUTH_DEVICE_CODE_ENDPOINT = `${QWEN_OAUTH_BASE_URL}/api/v1/oauth2/device/code`;
          const QWEN_OAUTH_TOKEN_ENDPOINT = `${QWEN_OAUTH_BASE_URL}/api/v1/oauth2/token`;
          
          // OFFICIAL Client ID from qwen-code source
          const QWEN_OAUTH_CLIENT_ID = 'f0304373b74a44d2b584a3fb70ca9e56';
          const QWEN_OAUTH_SCOPE = 'openid profile email model.completion';
          const QWEN_OAUTH_GRANT_TYPE = 'urn:ietf:params:oauth:grant-type:device_code';
          
          // Output files
          const AUTH_URL_FILE = '/tmp/qwen_auth_url.txt';
          const AUTH_TOKEN_FILE = '/tmp/qwen_auth_token.txt';
          const DEVICE_CODE_FILE = '/tmp/qwen_device_code.txt';
          const USER_CODE_FILE = '/tmp/qwen_user_code.txt';
          const AUTH_STATUS_FILE = '/tmp/qwen_auth_status.txt';
          const CODE_VERIFIER_FILE = '/tmp/qwen_code_verifier.txt';
          
          // =============================================================================
          // PKCE (Proof Key for Code Exchange) Implementation
          // Implements RFC 7636 - Required by Qwen OAuth
          // =============================================================================
          
          function generateCodeVerifier() {
            return crypto.randomBytes(32).toString('base64url');
          }
          
          function generateCodeChallenge(codeVerifier) {
            const hash = crypto.createHash('sha256');
            hash.update(codeVerifier);
            return hash.digest('base64url');
          }
          
          function generatePKCEPair() {
            const codeVerifier = generateCodeVerifier();
            const codeChallenge = generateCodeChallenge(codeVerifier);
            return { code_verifier: codeVerifier, code_challenge: codeChallenge };
          }
          
          // =============================================================================
          // URL-encoded form data (required by Qwen OAuth API)
          // =============================================================================
          
          function objectToUrlEncoded(data) {
            return Object.keys(data)
              .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(data[key])}`)
              .join('&');
          }
          
          // =============================================================================
          // HTTP Request Helper
          // =============================================================================
          
          function makeRequest(url, options, postData = null) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              
              const reqOptions = {
                hostname: urlObj.hostname,
                port: 443,
                path: urlObj.pathname + urlObj.search,
                method: options.method || 'GET',
                headers: options.headers || {}
              };
              
              const req = https.request(reqOptions, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    resolve({ status: res.statusCode, data: JSON.parse(data), raw: data });
                  } catch (e) {
                    resolve({ status: res.statusCode, data: data, raw: data });
                  }
                });
              });
              
              req.on('error', reject);
              req.setTimeout(30000, () => {
                req.destroy();
                reject(new Error('Request timeout'));
              });
              
              if (postData) {
                req.write(postData);
              }
              req.end();
            });
          }
          
          // =============================================================================
          // Device Authorization Flow
          // =============================================================================
          
          async function initiateDeviceAuth() {
            console.log('Initiating OAuth Device Authorization Flow with PKCE...');
            console.log(`Using official Qwen OAuth endpoint: ${QWEN_OAUTH_DEVICE_CODE_ENDPOINT}`);
            
            // Generate PKCE pair
            const { code_verifier, code_challenge } = generatePKCEPair();
            
            // Save code_verifier for token exchange
            fs.writeFileSync(CODE_VERIFIER_FILE, code_verifier);
            
            const bodyData = {
              client_id: QWEN_OAUTH_CLIENT_ID,
              scope: QWEN_OAUTH_SCOPE,
              code_challenge: code_challenge,
              code_challenge_method: 'S256'
            };
            
            const requestId = crypto.randomUUID();
            
            console.log('Sending device authorization request...');
            console.log(`Request ID: ${requestId}`);
            
            try {
              const response = await makeRequest(QWEN_OAUTH_DEVICE_CODE_ENDPOINT, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Accept': 'application/json',
                  'x-request-id': requestId,
                  'User-Agent': 'qwen-code-strix/1.0'
                }
              }, objectToUrlEncoded(bodyData));
              
              console.log(`Response status: ${response.status}`);
              
              if (response.status !== 200) {
                throw new Error(`Device auth request failed with status ${response.status}: ${response.raw}`);
              }
              
              const { 
                device_code, 
                user_code, 
                verification_uri, 
                verification_uri_complete, 
                expires_in
              } = response.data;
              
              if (!device_code || !verification_uri) {
                throw new Error(`Invalid response from device auth endpoint: ${JSON.stringify(response.data)}`);
              }
              
              // Save the auth information
              const authUrl = verification_uri_complete || `${verification_uri}?user_code=${user_code}`;
              fs.writeFileSync(AUTH_URL_FILE, authUrl);
              fs.writeFileSync(DEVICE_CODE_FILE, device_code);
              fs.writeFileSync(USER_CODE_FILE, user_code || '');
              fs.writeFileSync(AUTH_STATUS_FILE, 'device_code_received');
              
              console.log('');
              console.log('==============================================');
              console.log('  📍 QWEN OAUTH DEVICE AUTHORIZATION');
              console.log('==============================================');
              console.log('');
              console.log('  Please open this URL in your browser:');
              console.log('');
              console.log(`  🔗 ${authUrl}`);
              console.log('');
              if (user_code) {
                console.log(`  📋 User Code: ${user_code}`);
                console.log('');
              }
              console.log('  After logging in with your qwen.ai account,');
              console.log('  the workflow will detect your authorization');
              console.log('  and continue automatically.');
              console.log('');
              console.log(`  ⏳ This code expires in ${Math.floor(expires_in / 60)} minutes`);
              console.log('==============================================');
              
              return {
                device_code,
                user_code: user_code || '',
                auth_url: authUrl,
                code_verifier,
                expires_in: expires_in || 600,
                interval: 2 // Poll every 2 seconds as per official implementation
              };
              
            } catch (error) {
              console.error('Device authorization request failed:', error.message);
              fs.writeFileSync(AUTH_STATUS_FILE, 'error');
              throw error;
            }
          }
          
          // =============================================================================
          // Token Polling
          // =============================================================================
          
          async function pollForToken(deviceCode, codeVerifier, interval, maxWait) {
            console.log('');
            console.log('Polling for authentication...');
            console.log(`Using official Qwen OAuth token endpoint: ${QWEN_OAUTH_TOKEN_ENDPOINT}`);
            
            const startTime = Date.now();
            let pollInterval = Math.max(interval, 2) * 1000; // minimum 2 seconds
            
            while (Date.now() - startTime < maxWait * 1000) {
              await new Promise(resolve => setTimeout(resolve, pollInterval));
              
              const elapsed = Math.floor((Date.now() - startTime) / 1000);
              console.log(`Waiting for authentication... (${Math.floor(elapsed / 60)}m ${elapsed % 60}s)`);
              
              const bodyData = {
                grant_type: QWEN_OAUTH_GRANT_TYPE,
                client_id: QWEN_OAUTH_CLIENT_ID,
                device_code: deviceCode,
                code_verifier: codeVerifier
              };
              
              try {
                const response = await makeRequest(QWEN_OAUTH_TOKEN_ENDPOINT, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Accept': 'application/json',
                    'User-Agent': 'qwen-code-strix/1.0'
                  }
                }, objectToUrlEncoded(bodyData));
                
                // Handle successful token response
                if (response.status === 200 && response.data.access_token) {
                  const { access_token, refresh_token, expires_in, resource_url } = response.data;
                  
                  console.log('');
                  console.log('✅ Authentication successful!');
                  console.log('Access token acquired.');
                  
                  fs.writeFileSync(AUTH_TOKEN_FILE, access_token);
                  fs.writeFileSync(AUTH_STATUS_FILE, 'authenticated');
                  
                  // Save credentials in qwen format
                  const qwenDir = path.join(process.env.HOME || '/root', '.qwen');
                  if (!fs.existsSync(qwenDir)) {
                    fs.mkdirSync(qwenDir, { recursive: true });
                  }
                  
                  const credentials = {
                    access_token,
                    refresh_token: refresh_token || null,
                    resource_url: resource_url || null,
                    expiry_date: Date.now() + (expires_in || 86400) * 1000,
                    auth_method: 'device_flow'
                  };
                  
                  fs.writeFileSync(
                    path.join(qwenDir, 'oauth_creds.json'),
                    JSON.stringify(credentials, null, 2)
                  );
                  
                  return access_token;
                }
                
                // Handle authorization_pending (400 error)
                if (response.status === 400) {
                  const errorData = response.data;
                  
                  if (errorData.error === 'authorization_pending') {
                    // User hasn't authorized yet, continue polling
                    continue;
                  }
                  
                  if (errorData.error === 'slow_down') {
                    // Need to slow down polling
                    pollInterval = Math.min(pollInterval * 1.5, 10000);
                    console.log(`Server requested to slow down, increasing poll interval to ${pollInterval}ms`);
                    continue;
                  }
                  
                  if (errorData.error === 'expired_token') {
                    console.log('Device code expired. Please restart authentication.');
                    fs.writeFileSync(AUTH_STATUS_FILE, 'expired');
                    return null;
                  }
                  
                  if (errorData.error === 'access_denied') {
                    console.log('Access denied by user.');
                    fs.writeFileSync(AUTH_STATUS_FILE, 'denied');
                    return null;
                  }
                }
                
                // Handle rate limiting (429 error)
                if (response.status === 429) {
                  pollInterval = Math.min(pollInterval * 1.5, 10000);
                  console.log(`Rate limited, increasing poll interval to ${pollInterval}ms`);
                  continue;
                }
                
              } catch (error) {
                console.log(`Polling error: ${error.message}, will retry...`);
              }
            }
            
            console.log('');
            console.log('⚠️ Authentication timeout. You can still authenticate via the dashboard.');
            fs.writeFileSync(AUTH_STATUS_FILE, 'timeout');
            return null;
          }
          
          // =============================================================================
          // Main Execution
          // =============================================================================
          
          async function main() {
            try {
              const authInfo = await initiateDeviceAuth();
              
              // Poll for token for up to 10 minutes
              const token = await pollForToken(
                authInfo.device_code, 
                authInfo.code_verifier,
                authInfo.interval, 
                600
              );
              
              // Output results for GitHub Actions (using environment files)
              const githubOutput = process.env.GITHUB_OUTPUT;
              
              if (githubOutput) {
                fs.appendFileSync(githubOutput, `auth_url=${authInfo.auth_url}\n`);
                if (authInfo.user_code) {
                  fs.appendFileSync(githubOutput, `user_code=${authInfo.user_code}\n`);
                }
                if (token) {
                  fs.appendFileSync(githubOutput, `auth_token=${token}\n`);
                  fs.appendFileSync(githubOutput, `auth_success=true\n`);
                } else {
                  fs.appendFileSync(githubOutput, `auth_success=false\n`);
                }
              }
              
            } catch (error) {
              console.error('Authentication failed:', error.message);
              fs.writeFileSync(AUTH_STATUS_FILE, 'error');
              
              const githubOutput = process.env.GITHUB_OUTPUT;
              if (githubOutput) {
                fs.appendFileSync(githubOutput, `auth_success=false\n`);
                fs.appendFileSync(githubOutput, `auth_error=${error.message}\n`);
              }
              
              process.exit(1);
            }
          }
          
          main();
          DEVICEAUTHSCRIPT
          
          # Run the device auth script
          node /tmp/qwen_device_auth.js
          
          # Read results and set GitHub outputs (using GITHUB_OUTPUT environment file)
          AUTH_STATUS=$(cat /tmp/qwen_auth_status.txt 2>/dev/null || echo "unknown")
          
          if [ -f /tmp/qwen_auth_url.txt ]; then
            AUTH_URL=$(cat /tmp/qwen_auth_url.txt)
            echo "auth_url=$AUTH_URL" >> $GITHUB_OUTPUT
          fi
          
          if [ -f /tmp/qwen_user_code.txt ]; then
            USER_CODE=$(cat /tmp/qwen_user_code.txt)
            echo "user_code=$USER_CODE" >> $GITHUB_OUTPUT
          fi
          
          if [ -f /tmp/qwen_auth_token.txt ]; then
            AUTH_TOKEN=$(cat /tmp/qwen_auth_token.txt)
            echo "auth_token=$AUTH_TOKEN" >> $GITHUB_OUTPUT
            echo "auth_success=true" >> $GITHUB_OUTPUT
          else
            echo "auth_success=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Display Auth Status
        run: |
          echo "=============================================="
          echo "  QWEN OAUTH STATUS"
          echo "=============================================="
          if [ "${{ steps.auth.outputs.auth_success }}" == "true" ]; then
            echo "  ✅ Authentication: SUCCESS"
            echo "  Token will be passed to dashboard automatically."
          else
            echo "  ⏳ Authentication: PENDING"
            echo "  You can complete authentication in the dashboard."
          fi
          echo "=============================================="

  # =============================================================================
  # JOB 2: Main Dashboard Job
  # This runs the dashboard with the selected authentication method
  # =============================================================================
  dashboard:
    name: Start Dashboard & Run Scan (Qwen Code)
    runs-on: ubuntu-latest
    needs: [qwen_oauth_auth]
    if: always()
    timeout-minutes: 780  # 13 hours max (12h scan + 1h buffer)
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Set up Node.js (for qwen-code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install qwen-code CLI
        run: |
          npm install -g @qwen-code/qwen-code@latest
          echo "::notice::Installed qwen-code CLI"
      
      - name: Verify Docker Installation
        run: |
          docker --version
          docker info || sudo systemctl start docker
      
      - name: Install Strix
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install
      
      - name: Configure Environment Based on Provider Selection
        env:
          # From workflow inputs
          API_PROVIDER: ${{ inputs.api_provider }}
          QWEN_MODEL: ${{ inputs.qwen_model }}
          # From Qwen OAuth job (if ran)
          OAUTH_TOKEN: ${{ needs.qwen_oauth_auth.outputs.auth_token }}
          OAUTH_SUCCESS: ${{ needs.qwen_oauth_auth.outputs.auth_success }}
          # From secrets
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PERPLEXITY_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "=============================================="
          echo "  🔧 CONFIGURING ENVIRONMENT"
          echo "=============================================="
          echo ""
          echo "  Selected Provider: $API_PROVIDER"
          echo ""
          
          # Calculate total duration
          HOURS=${{ inputs.duration_hours }}
          MINUTES=${{ inputs.duration_minutes }}
          TOTAL_MINUTES=$((HOURS * 60 + MINUTES))
          echo "STRIX_DURATION_MINUTES=$TOTAL_MINUTES" >> $GITHUB_ENV
          echo "STRIX_DURATION_HOURS=${{ inputs.duration_hours }}" >> $GITHUB_ENV
          
          # Access configuration
          if [ "${{ inputs.enable_root_access }}" = "true" ]; then
            echo "STRIX_ROOT_ACCESS=true" >> $GITHUB_ENV
            echo "STRIX_ACCESS_LEVEL=root" >> $GITHUB_ENV
          else
            echo "STRIX_ROOT_ACCESS=false" >> $GITHUB_ENV
            echo "STRIX_ACCESS_LEVEL=${{ inputs.access_level }}" >> $GITHUB_ENV
          fi
          
          # Agent behavior
          echo "STRIX_PLANNING_DEPTH=${{ inputs.planning_depth }}" >> $GITHUB_ENV
          echo "STRIX_MAX_ITERATIONS=${{ inputs.max_iterations }}" >> $GITHUB_ENV
          echo "STRIX_ENABLE_MULTI_AGENT=${{ inputs.enable_multi_agent }}" >> $GITHUB_ENV
          echo "STRIX_OUTPUT_FORMAT=${{ inputs.output_format }}" >> $GITHUB_ENV
          echo "STRIX_SEVERITY_THRESHOLD=${{ inputs.severity_threshold }}" >> $GITHUB_ENV
          echo "STRIX_DEBUG=${{ inputs.debug_mode }}" >> $GITHUB_ENV
          
          # ============================================================
          # CRITICAL: Set provider-specific configuration
          # This is what makes the workflow selection functional
          # ============================================================
          
          echo "STRIX_AI_PROVIDER=qwencode" >> $GITHUB_ENV
          echo "QWENCODE_API_PROVIDER=$API_PROVIDER" >> $GITHUB_ENV
          echo "STRIX_WORKFLOW_PROVIDER=$API_PROVIDER" >> $GITHUB_ENV
          
          case "$API_PROVIDER" in
            "qwen_oauth")
              echo ""
              echo "  📍 Qwen OAuth Configuration"
              echo "  ────────────────────────────"
              echo "  • Auth Flow: OAuth Device Authorization via qwen.ai"
              echo "  • API Endpoint: DashScope (OpenAI-compatible)"
              echo "  • Free Tier: 2,000 requests/day"
              echo "  • Rate Limit: 60 requests/min"
              echo ""
              echo "  ⚠️  NOTE: The chat.qwen.ai endpoint is NOT OpenAI-compatible."
              echo "      Using DashScope API for LiteLLM integration."
              echo ""
              
              # CRITICAL FIX: Use DashScope (OpenAI-compatible) instead of chat.qwen.ai
              # The chat.qwen.ai/api/v1 endpoint is NOT an OpenAI-compatible API
              # and causes the 'str' object has no attribute 'model_dump' error.
              # 
              # DashScope API is Alibaba Cloud's OpenAI-compatible endpoint for Qwen models.
              # Reference: https://qwenlm.github.io/qwen-code-docs/en/users/configuration/auth/
              echo "OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1" >> $GITHUB_ENV
              echo "QWENCODE_API_BASE=https://dashscope.aliyuncs.com/compatible-mode/v1" >> $GITHUB_ENV
              echo "STRIX_LLM=qwencode/qwen-coder-plus-latest" >> $GITHUB_ENV
              echo "OPENAI_MODEL=qwen-coder-plus-latest" >> $GITHUB_ENV
              
              # Flag to indicate OAuth was selected in workflow
              echo "STRIX_OAUTH_SELECTED=true" >> $GITHUB_ENV
              echo "STRIX_OPENROUTER_SELECTED=false" >> $GITHUB_ENV
              echo "QWENCODE_API_PROVIDER=dashscope" >> $GITHUB_ENV
              
              # If we got a token from the OAuth job, use it
              if [ "$OAUTH_SUCCESS" == "true" ] && [ -n "$OAUTH_TOKEN" ]; then
                echo "OPENAI_API_KEY=$OAUTH_TOKEN" >> $GITHUB_ENV
                echo "QWENCODE_ACCESS_TOKEN=$OAUTH_TOKEN" >> $GITHUB_ENV
                echo "STRIX_AUTH_COMPLETED=true" >> $GITHUB_ENV
                echo "::notice::Qwen OAuth token obtained - using with DashScope API"
                echo "  ✅ Token from workflow authentication will be used"
                echo "  ✅ API requests routed to DashScope (OpenAI-compatible)"
              else
                echo "STRIX_AUTH_COMPLETED=false" >> $GITHUB_ENV
                echo "::warning::Qwen OAuth auth pending - complete in dashboard"
                echo "  ⚠️ Authentication not yet completed"
                echo "  ℹ️ Complete authentication in the dashboard"
              fi
              ;;
              
            "openrouter")
              echo ""
              echo "  📍 OpenRouter Configuration"
              echo "  ────────────────────────────"
              echo "  • API Endpoint: https://openrouter.ai/api/v1"
              echo "  • Free Tier: 1,000 requests/day"
              echo "  • Model: $QWEN_MODEL"
              echo ""
              
              echo "OPENAI_BASE_URL=https://openrouter.ai/api/v1" >> $GITHUB_ENV
              echo "QWENCODE_API_BASE=https://openrouter.ai/api/v1" >> $GITHUB_ENV
              echo "STRIX_LLM=qwencode/$QWEN_MODEL" >> $GITHUB_ENV
              echo "OPENAI_MODEL=$QWEN_MODEL" >> $GITHUB_ENV
              
              # Flag to indicate OpenRouter was selected in workflow
              echo "STRIX_OAUTH_SELECTED=false" >> $GITHUB_ENV
              echo "STRIX_OPENROUTER_SELECTED=true" >> $GITHUB_ENV
              
              # Check for OpenRouter API key in secrets
              if [ -n "$OPENROUTER_KEY" ] && [ "$OPENROUTER_KEY" != "" ]; then
                echo "OPENAI_API_KEY=$OPENROUTER_KEY" >> $GITHUB_ENV
                echo "QWENCODE_ACCESS_TOKEN=$OPENROUTER_KEY" >> $GITHUB_ENV
                echo "STRIX_AUTH_COMPLETED=true" >> $GITHUB_ENV
                echo "::notice::OpenRouter API key configured from secrets"
                echo "  ✅ API key from repository secrets will be used"
              else
                echo "STRIX_AUTH_COMPLETED=false" >> $GITHUB_ENV
                echo "::warning::No OPENROUTER_API_KEY secret found - enter in dashboard"
                echo "  ⚠️ No API key found in secrets"
                echo "  ℹ️ Enter your OpenRouter API key in the dashboard"
              fi
              ;;
          esac
          
          # Perplexity for web search (optional)
          if [ -n "$PERPLEXITY_KEY" ] && [ "$PERPLEXITY_KEY" != "" ]; then
            echo "PERPLEXITY_API_KEY=$PERPLEXITY_KEY" >> $GITHUB_ENV
            echo "::notice::Perplexity API key configured for web search"
          fi
          
          echo ""
          echo "=============================================="
      
      - name: Calculate Timeout Minutes
        id: timeout
        run: |
          HOURS=${{ inputs.duration_hours }}
          MINUTES=${{ inputs.duration_minutes }}
          TOTAL_MINUTES=$((HOURS * 60 + MINUTES))
          TIMEOUT_WITH_BUFFER=$((TOTAL_MINUTES + 15))
          echo "timeout_minutes=$TIMEOUT_WITH_BUFFER" >> $GITHUB_OUTPUT
          echo "scan_minutes=$TOTAL_MINUTES" >> $GITHUB_OUTPUT
          echo "::notice title=Scan Duration::${TOTAL_MINUTES} minutes (${HOURS}h ${MINUTES}m)"
      
      - name: Start Dashboard Server
        id: dashboard
        run: |
          PIDFILE="/tmp/strix_dashboard.pid"
          nohup poetry run python -m strix.dashboard.server --port $STRIX_DASHBOARD_PORT > /tmp/dashboard.log 2>&1 &
          DASHBOARD_PID=$!
          echo $DASHBOARD_PID > "$PIDFILE"
          echo "dashboard_pid=$DASHBOARD_PID" >> $GITHUB_OUTPUT
          
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:$STRIX_DASHBOARD_PORT/api/status > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 2
          done
          
          if [ "$SERVER_READY" = false ]; then
            echo "::error::Dashboard server failed to start"
            cat /tmp/dashboard.log || true
            exit 1
          fi
          
          echo "::notice::Dashboard server started successfully"
      
      - name: Setup Cloudflare Tunnel
        id: tunnel
        run: |
          TUNNEL_PIDFILE="/tmp/cloudflared.pid"
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          
          nohup ./cloudflared tunnel --url http://localhost:$STRIX_DASHBOARD_PORT --no-autoupdate > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo $TUNNEL_PID > "$TUNNEL_PIDFILE"
          echo "tunnel_pid=$TUNNEL_PID" >> $GITHUB_OUTPUT
          
          TUNNEL_URL=""
          for i in {1..12}; do
            sleep 5
            TUNNEL_URL=$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log 2>/dev/null | head -1) || true
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
          done
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "::error::Failed to get tunnel URL"
            cat /tmp/tunnel.log
            exit 1
          fi
          
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "::notice title=Dashboard URL::$TUNNEL_URL"
      
      - name: Display Dashboard Information
        run: |
          API_PROVIDER="${{ inputs.api_provider }}"
          
          echo "=============================================="
          echo "  🦉 STRIX AUTONOMOUS DASHBOARD"
          echo "  Powered by Qwen Code"
          echo "=============================================="
          echo ""
          echo "  📍 Dashboard URL:"
          echo "  ${{ steps.tunnel.outputs.tunnel_url }}"
          echo ""
          echo "  ⏱️  Duration: ${{ inputs.duration_hours }}h ${{ inputs.duration_minutes }}m"
          echo "  🔐 Access Level: ${{ inputs.access_level }}"
          echo "  📊 Planning Depth: ${{ inputs.planning_depth }}"
          echo ""
          
          if [ "$API_PROVIDER" = "qwen_oauth" ]; then
            echo "  ┌─────────────────────────────────────────────────────┐"
            echo "  │  🔐 QWEN OAUTH SELECTED                            │"
            echo "  ├─────────────────────────────────────────────────────┤"
            echo "  │  • 2,000 requests/day                              │"
            echo "  │  • 60 requests/min                                  │"
            echo "  │  • NO token limits, NO regional limits             │"
            echo "  ├─────────────────────────────────────────────────────┤"
            if [ "$STRIX_AUTH_COMPLETED" = "true" ]; then
              echo "  │  ✅ AUTHENTICATION COMPLETED                       │"
              echo "  │  Token passed from workflow authentication        │"
              echo "  │  AI model selection is pre-configured             │"
            else
              echo "  │  ⏳ AUTHENTICATION REQUIRED                        │"
              echo "  │  Complete login in the dashboard                  │"
            fi
            echo "  └─────────────────────────────────────────────────────┘"
          else
            echo "  ┌─────────────────────────────────────────────────────┐"
            echo "  │  🌐 OPENROUTER SELECTED                            │"
            echo "  ├─────────────────────────────────────────────────────┤"
            echo "  │  • 1,000 free requests/day                         │"
            echo "  │  • Model: ${{ inputs.qwen_model }}                  │"
            echo "  │  • Endpoint: https://openrouter.ai/api/v1          │"
            echo "  ├─────────────────────────────────────────────────────┤"
            if [ "$STRIX_AUTH_COMPLETED" = "true" ]; then
              echo "  │  ✅ API KEY CONFIGURED                             │"
              echo "  │  Using OPENROUTER_API_KEY from secrets            │"
            else
              echo "  │  ⏳ API KEY REQUIRED                               │"
              echo "  │  Enter your OpenRouter API key in dashboard       │"
            fi
            echo "  └─────────────────────────────────────────────────────┘"
          fi
          echo ""
          echo "  ⏳ Waiting up to ${{ inputs.config_wait_minutes }} minutes for configuration..."
          echo "=============================================="
      
      - name: Wait for Configuration
        run: |
          CONFIG_READY_FILE="/tmp/strix_config_ready"
          MAX_WAIT=$((60 * ${{ inputs.config_wait_minutes }}))
          WAITED=0
          
          while [ ! -f "$CONFIG_READY_FILE" ] && [ $WAITED -lt $MAX_WAIT ]; do
            sleep 10
            WAITED=$((WAITED + 10))
            echo "Waiting for configuration... ($((WAITED / 60))m $((WAITED % 60))s / ${{ inputs.config_wait_minutes }}m)"
          done
          
          if [ ! -f "$CONFIG_READY_FILE" ]; then
            echo "::error::Configuration timeout"
            exit 1
          fi
      
      - name: Run Autonomous Scan
        env:
          SCAN_TIMEOUT_MINUTES: ${{ steps.timeout.outputs.scan_minutes }}
        run: |
          CONFIG_FILE="/tmp/strix_scan_config.json"
          
          if [ -f "$CONFIG_FILE" ]; then
            TARGET=$(jq -r '.targets.primary' "$CONFIG_FILE")
            
            if [ -n "$TARGET" ] && [ "$TARGET" != "null" ]; then
              [ -f "/tmp/strix_scan_config.env" ] && source /tmp/strix_scan_config.env
              
              STRIX_CMD="poetry run strix -n --target \"$TARGET\" --run-name \"github-action-$(date +%Y%m%d-%H%M%S)\""
              [ "${{ inputs.enable_root_access }}" = "true" ] && STRIX_CMD="$STRIX_CMD --root-access"
              STRIX_CMD="$STRIX_CMD --access-level ${{ inputs.access_level }}"
              
              timeout "${SCAN_TIMEOUT_MINUTES}m" bash -c "$STRIX_CMD" || {
                EXIT_CODE=$?
                [ $EXIT_CODE -eq 124 ] && exit 0
                exit $EXIT_CODE
              }
            else
              echo "::error::No valid target found"
              exit 1
            fi
          else
            echo "::error::Configuration file not found"
            exit 1
          fi
        timeout-minutes: 720
      
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🦉 Strix Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: ${{ inputs.duration_hours }}h ${{ inputs.duration_minutes }}m" >> $GITHUB_STEP_SUMMARY
          echo "- **AI Provider**: Qwen Code (${{ inputs.api_provider }})" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.api_provider }}" = "openrouter" ]; then
            echo "- **Model**: ${{ inputs.qwen_model }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Model**: qwen3-coder-plus (default)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Planning Depth**: ${{ inputs.planning_depth }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Authentication Method Used" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.api_provider }}" = "qwen_oauth" ]; then
            echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Method** | Qwen OAuth |" >> $GITHUB_STEP_SUMMARY
            echo "| **Free Tier** | 2,000 requests/day |" >> $GITHUB_STEP_SUMMARY
            echo "| **Rate Limit** | 60 requests/min |" >> $GITHUB_STEP_SUMMARY
            echo "| **Endpoint** | https://chat.qwen.ai/api/v1 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Method** | OpenRouter |" >> $GITHUB_STEP_SUMMARY
            echo "| **Free Tier** | 1,000 requests/day |" >> $GITHUB_STEP_SUMMARY
            echo "| **Endpoint** | https://openrouter.ai/api/v1 |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reference: [qwen-code GitHub](https://github.com/QwenLM/qwen-code)" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strix-scan-results-${{ github.run_number }}
          path: strix_runs/
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload Dashboard Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-logs-${{ github.run_number }}
          path: /tmp/*.log
          retention-days: 7
          if-no-files-found: ignore
      
      - name: Cleanup
        if: always()
        run: |
          if [ -f "/tmp/strix_dashboard.pid" ]; then kill "$(cat /tmp/strix_dashboard.pid)" 2>/dev/null || true; fi
          if [ -f "/tmp/cloudflared.pid" ]; then kill "$(cat /tmp/cloudflared.pid)" 2>/dev/null || true; fi
          pkill -f "strix.dashboard.server" || true
          pkill -f "cloudflared" || true
